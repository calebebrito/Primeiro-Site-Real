<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="loginBody">

    <div class="goHomeVs2" style="margin: 4px; font-size: 22pt; width: auto;">
        <a href="homeScreen.html">
            <p><i>VERSUS</i></p>
        </a>
    </div>

    <div class="logCard">
        <h1 class="signVs arial"><i>VS</i></h1>

        <p class="log arial">Entrar</p>

            <div class="emailInput arial">
                <img src="images/email-icon.png" alt="email icon">
                <input type="email" placeholder="Email">
            </div>
            
            <div class="passInput arial">
                <img src="images/lock-icon.png" alt="lock icon">
                <input type="password" placeholder="Senha">
            </div>


            <div class="createLogBut">
                <p class="arial">Entrar</p>
            </div>

            <p class="alreadyLog arial">Não tem uma conta ainda? <a href="signUpScreen.html" style="color: #0099ff;"> Criar Conta</a></p>
    </div>
</body>
</html>
