<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="journeyBody">
    <section>
        <div class="statsCard">
            <p class="journeyTxt arial">Progresso</p>

            <div class="lvlBox">
                <div class="levelLine">
                    <p class="level arial">Nível 7</p>
                    <p class="levelTitle arial">(Díscipulo)</p>
                </div>
                <div class="xpBar">
                    <div class="xpFill" id="xpFill"></div>
                </div>
                <p class="xpTxt arial" id="xpTxt"></p>
            </div>

            <div class="achievBox arial">
                <div class="achievsLink">
                    <p class="achievTxt">Conquistas</p>
                    <a href="achievements.html">
                        Ver todas➝
                    </a>
                </div>

                <div class="compQuiz">
                    <p class="check">✔</p>
                    <p class="achievs"><strong>10</strong> quizzes completos</p>
                </div>
                <div class="compQuiz">
                    <p class="check">✔</p>
                    <p class="achievs"><strong>50</strong> respostas certas</p>
                </div>
                <div class="compQuiz">
                    <p class="check">✔</p>
                    <p class="achievs">Atinja o nível <strong>5</strong></p>
                </div>
            </div>

            <div id="verses">
                <p class="verseTxt arial">Versículo do dia</p> <br>
                <p id="verseText" class="arial"></p>
                <p id="verseRef" class="arial"></p>
            </div>

        </div>

        <div class="statsCard2">
            <p class="journeyTxt arial">Minha Jornada</p>

            <div class="rank">
                <img src="rank-imgs/ascend+_rank.png" alt="ranking" class="mainRank">
                <p class="rankTxt arial">Ascend +</p>
            </div>

            <div class="rankBar">
                <div class="rankFill"></div>
            </div>
            <p class="rankXp arial"></p>

            <div class="battleBar">
                <div class="wins"></div>
                <div class="middleLine"></div>    
                <div class="losses"></div>
            </div>

            <p class="battleTxt arial"></p>
        </div>

    </section>

    <script src="journey.js"></script>
</body>
</html>
