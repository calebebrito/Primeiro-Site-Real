<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="journeyBody">
    <section>
        <div class="statsCard">
            <p class="journeyTxt arial">Progress</p>

            <div class="lvlBox">
                <div class="levelLine">
                    <p class="level arial">Level 7</p>
                    <p class="levelTitle arial">(Discipule)</p>
                </div>
                <div class="xpBar">
                    <div class="xpFill" id="xpFill"></div>
                </div>
                <p class="xpTxt arial" id="xpTxt"></p>
            </div>

            <div class="achievBox arial">
                <div class="achievsLink">
                    <p class="achievTxt">Achievements</p>
                    <a href="achievements.html">
                        View All➝
                    </a>
                </div>

                <div class="compQuiz">
                    <p class="check">✔</p>
                    <p class="achievs"><strong>10</strong> completed quizzes</p>
                </div>
                <div class="compQuiz">
                    <p class="check">✔</p>
                    <p class="achievs"><strong>50</strong> right answers</p>
                </div>
                <div class="compQuiz">
                    <p class="check">✔</p>
                    <p class="achievs">Reach level <strong>5</strong></p>
                </div>
            </div>

            <div id="verses">
                <p class="verseTxt arial">Day verse</p> <br>
                <p id="verseText" class="arial"></p>
                <p id="verseRef" class="arial"></p>
            </div>

        </div>

        <div class="statsCard2">
            <p class="journeyTxt arial">My Journey</p>

            <div class="leftJourney">
                <div class="ranked">
                    <p class="arial">Ranked</p>
                </div>

                <div class="rank">
                    <img src="rank-imgs/ascend+_rank.png" alt="ranking" class="mainRank">
                    <p class="rankTxt arial">Ascend +</p>
                </div>

                <div class="rankBar">
                    <div class="rankFill"></div>
                </div>
                
                <div class="battleBar">
                    <div class="wins"></div>
                    <div class="middleLine"></div>    
                    <div class="losses"></div>
                </div>
                
                <p class="battleTxt arial"></p>
            </div>

            <div class="stats">
                
            </div>
        </div>

    </section>

    <script src="journey.js"></script>
</body>
</html>
